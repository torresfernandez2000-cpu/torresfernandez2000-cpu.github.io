<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jorge Torres — Chef · Consultor · Estratega gastronómico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #080808;
    --oscuro: #111111;
    --oro: #C9A84C;
    --oro-claro: #e8c97a;
    --crema: #F5EDD6;
    --texto: #d4c9b0;
    --texto-suave: #7a7060;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--negro); color: var(--texto); font-family: 'Montserrat', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }
  .cursor { position: fixed; width: 8px; height: 8px; background: var(--oro); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
  .cursor-ring { position: fixed; width: 32px; height: 32px; border: 1px solid var(--oro); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); opacity: 0.5; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 28px 60px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; letter-spacing: 3px; color: var(--crema); text-decoration: none; text-transform: uppercase; }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a { color: var(--texto-suave); text-decoration: none; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover { color: var(--oro); }
  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; padding: 120px 40px 80px; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(201,168,76,0.06) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%); }
  .hero-tag { font-size: 9px; letter-spacing: 6px; text-transform: uppercase; color: var(--oro); margin-bottom: 32px; opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(64px, 10vw, 120px); font-weight: 300; line-height: 0.95; color: var(--crema); letter-spacing: -1px; margin-bottom: 8px; opacity: 0; animation: fadeUp 1s ease 0.5s forwards; }
  .hero h1 em { font-style: italic; color: var(--oro-claro); }
  .hero-sub { font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 2.5vw, 22px); font-weight: 300; font-style: italic; color: var(--texto-suave); margin-top: 24px; margin-bottom: 60px; max-width: 600px; line-height: 1.6; opacity: 0; animation: fadeUp 1s ease 0.7s forwards; }
  .hero-sub span { color: var(--oro); font-style: normal; font-weight: 400; }
  .hero-cta { display: inline-block; padding: 16px 48px; border: 1px solid var(--oro); color: var(--oro); text-decoration: none; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; transition: all 0.4s; position: relative; overflow: hidden; opacity: 0; animation: fadeUp 1s ease 0.9s forwards; }
